<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
    <meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
    <meta name="referrer" content="no-referrer">
    <title>Claudia Z</title>
    <link rel="icon" href="favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">
    <meta name="theme-color" content="#090e0f">
    <link rel="stylesheet" href="src/styles.css?v=20260624-1">
  </head>
  <body>
    <main class="presentation" aria-live="polite">
      <section class="stage" data-i18n-aria="presentationAria">
        <img class="stage__media" id="zoneMedia" src="assets/media/overview/dji_0279-mobile.webp" srcset="assets/media/overview/dji_0279-mobile.webp 760w, assets/media/overview/dji_0279-stage.webp 1440w" sizes="100vw" alt="" decoding="async" fetchpriority="high" draggable="false">
        <div class="media-guard" id="mediaGuard" aria-hidden="true"></div>
        <div class="stage__scrim" aria-hidden="true"></div>

        <div class="topbar" data-i18n-aria="controlsAria">
          <div class="controls">
            <button class="info-trigger" type="button" id="detailsButton" aria-expanded="false" aria-controls="detailsSheet">
              <span class="info-trigger__mark" aria-hidden="true">i</span>
              <span class="info-trigger__hint" data-i18n="details"></span>
            </button>
            <button class="theme-button" type="button" id="themeButton" aria-pressed="false">
              <span class="theme-button__label" data-i18n="theme"></span>
              <span class="theme-button__icon" aria-hidden="true"></span>
            </button>
          </div>
        </div>

        <div class="stage-builder-mark" aria-label="Sunseeker">
          <img class="sunseeker-mark sunseeker-mark--on-dark" src="assets/brand/sunseeker-mark-on-dark.png" alt="Sunseeker" draggable="false">
          <img class="sunseeker-mark sunseeker-mark--on-light" src="assets/brand/sunseeker-mark-on-light.png" alt="Sunseeker" draggable="false">
        </div>

        <div class="stage__content">
          <p class="eyebrow" data-i18n="eyebrow"></p>
          <h1 class="sr-only" data-i18n="headline"></h1>
          <div class="hero-wordmark" aria-hidden="true">
            <img class="claudia-wordmark claudia-wordmark--on-dark" src="assets/brand/claudia-z-logo-on-dark.webp" alt="" draggable="false">
            <img class="claudia-wordmark claudia-wordmark--on-light" src="assets/brand/claudia-z-logo-on-light.webp" alt="" draggable="false">
          </div>
          <p class="lead" id="stageLead"></p>
          <p class="stage-zone-detail" id="stageZoneDetail"></p>

          <div class="quickfacts" data-i18n-aria="keyFactsAria">
            <span data-fact="length"></span>
            <span data-fact="cabins"></span>
            <span data-fact="speed"></span>
          </div>
        </div>

        <div class="media-stepper" data-i18n-aria="mediaControlsAria">
          <button class="step-button" type="button" id="prevMediaButton" data-i18n-aria="previousMedia">‹</button>
          <span class="media-stepper__count" id="mediaCounter" aria-live="polite"></span>
          <button class="step-button" type="button" id="nextMediaButton" data-i18n-aria="nextMedia">›</button>
          <button class="step-button step-button--expand" type="button" id="openMediaButton" data-i18n-aria="openMedia">⤢</button>
        </div>
        <div class="swipe-hint" id="swipeHint" data-i18n="swipeHint" aria-hidden="true"></div>

        <div class="command">
          <span class="zone-current-label" id="currentZoneLabel"></span>
          <button class="zone-menu-button" type="button" id="zoneMenuButton" aria-expanded="false" aria-controls="zoneRail">
            <span class="zone-menu-button__icon" aria-hidden="true"></span>
          </button>
          <nav class="zone-rail" id="zoneRail" data-i18n-aria="zonesAria">
            <button class="section-gallery-button" type="button" id="horizontalGalleryButton" data-i18n="horizontalGallery" data-i18n-aria="horizontalGalleryAria" hidden></button>
          </nav>
        </div>

      </section>

      <aside class="sheet zone-sheet" id="detailsSheet" role="dialog" aria-modal="true" aria-hidden="true" data-i18n-aria="detailsDialogAria">
        <div class="sheet__bar">
          <strong data-i18n="detailsTitle"></strong>
          <button class="icon-button" type="button" data-close="details" data-i18n-aria="close">×</button>
        </div>
        <div class="sheet-builder-mark" aria-label="Sunseeker">
          <img class="sunseeker-mark sunseeker-mark--on-dark" src="assets/brand/sunseeker-mark-on-dark.png" alt="Sunseeker" draggable="false">
          <img class="sunseeker-mark sunseeker-mark--on-light" src="assets/brand/sunseeker-mark-on-light.png" alt="Sunseeker" draggable="false">
        </div>
        <div class="sheet__grid">
          <dl class="specs">
            <div><dt data-i18n="model"></dt><dd data-i18n="modelValue"></dd></div>
            <div><dt data-i18n="year"></dt><dd>2020</dd></div>
            <div><dt data-i18n="length"></dt><dd data-i18n="lengthValue"></dd></div>
            <div><dt data-i18n="beam"></dt><dd>5.95 m / 19'6"</dd></div>
            <div><dt data-i18n="draft"></dt><dd>1.70 m / 5'7"</dd></div>
            <div><dt data-i18n="displacement"></dt><dd>53,700 kg / 118,140 lb</dd></div>
            <div><dt data-i18n="accommodation"></dt><dd data-i18n="accommodationValue"></dd></div>
            <div><dt data-i18n="heads"></dt><dd data-i18n="headsValue"></dd></div>
            <div><dt data-i18n="engines"></dt><dd>MAN V12 1550 · 2 x 1550 PS</dd></div>
            <div><dt data-i18n="propulsion"></dt><dd data-i18n="propulsionValue"></dd></div>
            <div><dt data-i18n="speed"></dt><dd data-i18n="speedValue"></dd></div>
            <div><dt data-i18n="range"></dt><dd>500 nm @ 10 kn</dd></div>
            <div><dt data-i18n="fuel"></dt><dd>6,000 l</dd></div>
            <div><dt data-i18n="freshWater"></dt><dd>1,400 l</dd></div>
            <div><dt data-i18n="blackWater"></dt><dd>400 l</dd></div>
            <div><dt data-i18n="generators"></dt><dd>2 x 15 kW</dd></div>
            <div><dt data-i18n="watermaker"></dt><dd>150 l/h</dd></div>
            <div><dt data-i18n="laundry"></dt><dd data-i18n="laundryValue"></dd></div>
          </dl>
          <div class="zone-note">
            <p id="zoneTitle"></p>
            <p id="zoneCopy"></p>
            <p id="zoneDetail"></p>
          </div>
        </div>
      </aside>

      <section class="lightbox" id="mediaLightbox" aria-hidden="true" data-i18n-aria="mediaViewerAria">
        <button class="icon-button lightbox__close" type="button" data-close="lightbox" data-i18n-aria="close">×</button>
        <img class="lightbox__image" id="lightboxImage" alt="" draggable="false">
      </section>

      <section class="gallery-mode" id="galleryMode" aria-hidden="true" role="dialog" data-i18n-aria="sectionGalleryAria">
        <button class="icon-button gallery-mode__close" type="button" data-close="gallery" data-i18n-aria="close">×</button>
        <div class="gallery-mode__viewport" id="galleryViewport">
          <img class="gallery-mode__image" id="galleryImage" alt="" draggable="false">
          <p class="gallery-mode__caption" id="galleryCaption"></p>
        </div>
      </section>

    </main>

    <script src="src/app.js?v=20260624-2" defer></script>
  </body>
</html>
