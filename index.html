<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="robots" content="noindex, nofollow, noarchive">
    <meta name="googlebot" content="noindex, nofollow, noarchive">
    <meta name="referrer" content="no-referrer">
    <title>Claudia Z</title>
    <link rel="stylesheet" href="src/styles.css">
  </head>
  <body>
    <main class="presentation" aria-live="polite">
      <section class="stage" aria-label="Private yacht presentation">
        <img class="stage__media" id="zoneMedia" src="assets/media/overview/dji_0266_1-stage.webp" alt="" decoding="async" fetchpriority="high" draggable="false">
        <div class="media-guard" id="mediaGuard" aria-hidden="true"></div>
        <div class="stage__scrim" aria-hidden="true"></div>

        <div class="topbar" aria-label="Presentation controls">
          <div class="controls">
            <button class="info-trigger" type="button" id="detailsButton" aria-expanded="false" aria-controls="detailsSheet">
              <span class="info-trigger__mark" aria-hidden="true">i</span>
              <span class="info-trigger__hint" data-i18n="details"></span>
            </button>
            <button class="theme-button" type="button" id="themeButton" aria-label="Switch theme" aria-pressed="false">
              <span class="theme-button__icon" aria-hidden="true"></span>
            </button>
          </div>
        </div>

        <div class="stage-builder-mark" aria-label="Sunseeker">
          <img class="sunseeker-mark sunseeker-mark--on-dark" src="assets/brand/sunseeker-mark-on-dark.png" alt="Sunseeker" draggable="false">
          <img class="sunseeker-mark sunseeker-mark--on-light" src="assets/brand/sunseeker-mark-on-light.png" alt="Sunseeker" draggable="false">
        </div>

        <div class="stage__content">
          <p class="eyebrow" data-i18n="eyebrow"></p>
          <h1 class="sr-only" data-i18n="headline"></h1>
          <div class="hero-wordmark" aria-hidden="true">
            <img class="claudia-wordmark claudia-wordmark--on-dark" src="assets/brand/claudia-z-logo-on-dark.webp" alt="" draggable="false">
            <img class="claudia-wordmark claudia-wordmark--on-light" src="assets/brand/claudia-z-logo-on-light.webp" alt="" draggable="false">
          </div>
          <p class="lead" id="stageLead"></p>
          <p class="stage-zone-detail" id="stageZoneDetail"></p>

          <div class="quickfacts" aria-label="Key facts">
            <span data-fact="length"></span>
            <span data-fact="cabins"></span>
            <span data-fact="speed"></span>
          </div>
        </div>

        <div class="media-stepper" aria-label="Media controls">
          <button class="step-button" type="button" id="prevMediaButton" data-i18n-aria="previousMedia">‹</button>
          <span class="media-stepper__count" id="mediaCounter" aria-live="polite"></span>
          <button class="step-button" type="button" id="nextMediaButton" data-i18n-aria="nextMedia">›</button>
          <button class="step-button step-button--expand" type="button" id="openMediaButton" data-i18n-aria="openMedia">⤢</button>
        </div>
        <div class="swipe-hint" id="swipeHint" data-i18n="swipeHint" aria-hidden="true"></div>

        <div class="command">
          <button class="zone-menu-button" type="button" id="zoneMenuButton" aria-expanded="false" aria-controls="zoneRail">
            <span class="zone-menu-button__icon" aria-hidden="true"></span>
            <span id="currentZoneLabel"></span>
          </button>
          <nav class="zone-rail" id="zoneRail" aria-label="Yacht zones"></nav>
        </div>
      </section>

      <aside class="sheet" id="detailsSheet" role="dialog" aria-modal="true" aria-hidden="true" aria-label="Yacht details">
        <div class="sheet__bar">
          <strong data-i18n="detailsTitle"></strong>
          <button class="icon-button" type="button" data-close="details" aria-label="Close">×</button>
        </div>
        <div class="sheet-identity" aria-hidden="true">
          <img class="claudia-wordmark claudia-wordmark--on-dark" src="assets/brand/claudia-z-logo-on-dark.webp" alt="" draggable="false">
          <img class="claudia-wordmark claudia-wordmark--on-light" src="assets/brand/claudia-z-logo-on-light.webp" alt="" draggable="false">
        </div>
        <div class="builder-mark" aria-label="Sunseeker">
          <img class="sunseeker-mark sunseeker-mark--on-dark" src="assets/brand/sunseeker-mark-on-dark.png" alt="Sunseeker" draggable="false">
          <img class="sunseeker-mark sunseeker-mark--on-light" src="assets/brand/sunseeker-mark-on-light.png" alt="Sunseeker" draggable="false">
        </div>
        <div class="sheet__grid">
          <dl class="specs">
            <div><dt data-i18n="length"></dt><dd>24 m</dd></div>
            <div><dt data-i18n="beam"></dt><dd>5.95 m / 19'6"</dd></div>
            <div><dt data-i18n="draft"></dt><dd>2.2 m / 5'7"</dd></div>
            <div><dt data-i18n="engines"></dt><dd>MAN V12 1550 · 2 x 1550 PS</dd></div>
            <div><dt data-i18n="dryWeight"></dt><dd>53,700 kg / 118,140 lb</dd></div>
            <div><dt data-i18n="fuel"></dt><dd>6,000 l</dd></div>
            <div><dt data-i18n="freshWater"></dt><dd>1,400 l</dd></div>
            <div><dt data-i18n="range"></dt><dd>500 nm @ 10 kn</dd></div>
          </dl>
          <div class="zone-note">
            <p id="zoneTitle"></p>
            <p id="zoneCopy"></p>
            <p id="zoneDetail"></p>
          </div>
        </div>
      </aside>

      <section class="lightbox" id="mediaLightbox" aria-hidden="true" aria-label="Media viewer">
        <button class="icon-button lightbox__close" type="button" data-close="lightbox" aria-label="Close">×</button>
        <img class="lightbox__image" id="lightboxImage" alt="" draggable="false">
      </section>

    </main>

    <script src="src/app.js" defer></script>
  </body>
</html>
