<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
    <title>Yacht Presentation Template</title>
    <link rel="stylesheet" href="template.css">
  </head>
  <body data-screen="hall">
    <main class="hall" aria-label="Yacht selection hall">
      <section class="hall__intro">
        <p class="eyebrow">Template hall</p>
        <h1>Yacht presentation</h1>
        <p class="muted">Choose a placeholder yacht to open the empty presentation shell.</p>
      </section>

      <nav class="yacht-grid" aria-label="Yachts">
        <a class="yacht-card" href="yacht.html?yacht=1">
          <span class="yacht-card__media" aria-hidden="true"></span>
          <span class="yacht-card__label">Yacht 1</span>
        </a>
        <a class="yacht-card" href="yacht.html?yacht=2">
          <span class="yacht-card__media" aria-hidden="true"></span>
          <span class="yacht-card__label">Yacht 2</span>
        </a>
        <a class="yacht-card" href="yacht.html?yacht=3">
          <span class="yacht-card__media" aria-hidden="true"></span>
          <span class="yacht-card__label">Yacht 3</span>
        </a>
        <a class="yacht-card" href="yacht.html?yacht=4">
          <span class="yacht-card__media" aria-hidden="true"></span>
          <span class="yacht-card__label">Yacht 4</span>
        </a>
        <a class="yacht-card" href="yacht.html?yacht=5">
          <span class="yacht-card__media" aria-hidden="true"></span>
          <span class="yacht-card__label">Yacht 5</span>
        </a>
      </nav>
    </main>
  </body>
</html>
